# Declarative Stage Definition for StageFlow State Machine
# ===========================================================
# To add a stage: add an entry under "stages" list.
# To add a transition: add an entry under "transitions" list.
# To add a condition: use any registered condition type (see stageflow/core/conditions.py).
#
# Built-in condition types:
#   file_exists, file_not_exists, file_contains, file_not_contains,
#   json_field, yaml_field, shell_test, python_expr, env_var,
#   all_of, any_of, not, always, never

stages:
  # ── Stage 1: Pick ───────────────────────────────────────────────────
  - name: pick
    tools:
      - Read
      - Grep
      - Glob
      - WebSearch
      - WebFetch
      - Bash(git *)
      - Bash(gh issue *)
      - Bash(ls *)
      - TaskCreate
      - TaskUpdate
      - AskUserQuestion
    meta:
      description: "从 Backlog 中选择 Issue，获取上下文、环境信息和相关日志"

  # ── Stage 2: Analyze ────────────────────────────────────────────────
  - name: analyze
    tools:
      - Read
      - Grep
      - Glob
      - WebSearch
      - WebFetch
      - Bash(git *)
      - Bash(python *)
      - Bash(find *)
      - Bash(ls *)
      - TaskCreate
      - TaskUpdate
    meta:
      description: "分析 Issue 根因、影响范围、涉及代码路径"

  # ── Stage 3: Plan ───────────────────────────────────────────────────
  - name: plan
    tools:
      - Read
      - Grep
      - Glob
      - Write
      - Edit
      - Bash(python *)
      - Bash(git *)
      - TaskCreate
      - TaskUpdate
      - AskUserQuestion
      - EnterPlanMode
    meta:
      description: "设计方案，编写 task_plan.md，确认修改范围和回滚策略"

  # ── Stage 4: Implement ──────────────────────────────────────────────
  - name: implement
    tools:
      - Read
      - Edit
      - Write
      - Grep
      - Glob
      - Bash(git *)
      - Bash(python *)
      - Bash(npm *)
      - Bash(cargo *)
      - Bash(go *)
      - Bash(make *)
      - TaskCreate
      - TaskUpdate
    meta:
      description: "按 task_plan.md 实施代码修改，提交 commit"
    on_enter:
      - python: "print(f'[StageFlow] Entering implement stage')"
    on_exit:
      - python: "print(f'[StageFlow] Exiting implement stage')"

  # ── Stage 5: Verify ─────────────────────────────────────────────────
  - name: verify
    tools:
      - Read
      - Grep
      - Glob
      - Bash(git *)
      - Bash(python *)
      - Bash(pytest *)
      - Bash(npm test*)
      - Bash(cargo test*)
      - Bash(go test*)
      - Bash(make test*)
      - Bash(ls *)
      - TaskCreate
      - TaskUpdate
    meta:
      description: "执行测试验证，收集证据，记录测试结果"

  # ── Stage 6: Document ───────────────────────────────────────────────
  - name: document
    tools:
      - Read
      - Write
      - Edit
      - Grep
      - Glob
      - Bash(git *)
      - Bash(python *)
      - Bash(ls *)
      - TaskCreate
      - TaskUpdate
    meta:
      description: "编写变更文档、更新 CHANGELOG、补充注释"

  # ── Stage 7: MR ─────────────────────────────────────────────────────
  - name: mr
    tools:
      - Read
      - Bash(git *)
      - Bash(gh *)
      - Bash(python *)
      - Write
      - Edit
      - Grep
      - TaskCreate
      - TaskUpdate
    meta:
      description: "创建 MR/PR，填写描述，关联 Issue"

  # ── Stage 8: Review ─────────────────────────────────────────────────
  - name: review
    tools:
      - Read
      - Grep
      - Glob
      - Bash(git *)
      - Bash(gh *)
      - Bash(python *)
      - WebFetch
      - TaskCreate
      - TaskUpdate
    meta:
      description: "响应 Review 意见，修改代码，直到 LGTM"

  # ── Stage 9: Wrap Up ────────────────────────────────────────────────
  - name: wrap_up
    tools:
      - Read
      - Write
      - Edit
      - Bash(git *)
      - Bash(python *)
      - Bash(ls *)
      - TaskCreate
      - TaskUpdate
      - TaskList
    meta:
      description: "收尾：清理分支、更新状态、归档产物"

  # ── Terminal Stage ──────────────────────────────────────────────────
  - name: done
    tools: []
    meta:
      description: "流程终点，所有工具可用"

transitions:
  # ── Pick → Analyze ──────────────────────────────────────────────────
  - from: pick
    to: analyze
    description: "Issue 上下文已就绪，开始分析"
    conditions:
      - file_exists: artifacts/pick/issue_context.md

  # ── Analyze → Plan ──────────────────────────────────────────────────
  - from: analyze
    to: plan
    description: "分析完成，产出 findings.md"
    conditions:
      - file_exists: artifacts/analyze/findings.md
      - file_contains:
          path: artifacts/analyze/findings.md
          pattern: "## (根因|Root Cause|Analysis|分析)"
    on_fail: analyze

  # ── Plan → Implement ────────────────────────────────────────────────
  - from: plan
    to: implement
    description: "方案就绪，任务清单完备"
    conditions:
      - file_exists: artifacts/plan/task_plan.md
      - file_contains:
          path: artifacts/plan/task_plan.md
          pattern: "## (Task|任务|Plan|方案)"
    on_fail: plan

  # ── Implement → Verify ──────────────────────────────────────────────
  - from: implement
    to: verify
    description: "代码修改已完成，进入验证"
    conditions:
      - shell_test:
          command: "git diff --name-only HEAD 2>/dev/null | wc -l"
          op: gt
          value: 0
    on_fail: implement

  # ── Verify → Document ───────────────────────────────────────────────
  - from: verify
    to: document
    description: "测试通过，编写文档"
    conditions:
      - file_exists: artifacts/verify/test_results.md
      - file_contains:
          path: artifacts/verify/test_results.md
          pattern: "(PASS|通过|All tests passed)"
    on_fail: implement

  # ── Verify → Implement (retry loop) ─────────────────────────────────
  - from: verify
    to: implement
    description: "测试失败，回退 implement 重试"
    conditions:
      - file_exists: artifacts/verify/test_results.md
      - file_contains:
          path: artifacts/verify/test_results.md
          pattern: "(FAIL|失败|Error)"

  # ── Document → MR ───────────────────────────────────────────────────
  - from: document
    to: mr
    description: "文档齐备，创建 MR"
    conditions:
      - file_exists: artifacts/document/changelog.md

  # ── MR → Review ─────────────────────────────────────────────────────
  - from: mr
    to: review
    description: "MR 已创建，等待 Review"
    conditions:
      - shell_test:
          command: "gh pr list --state open --limit 1 2>/dev/null | wc -l"
          op: gt
          value: 0

  # ── Review → Wrap Up ────────────────────────────────────────────────
  - from: review
    to: wrap_up
    description: "Review 通过，收尾归档"
    conditions:
      - shell_test:
          command: "gh pr view --json state 2>/dev/null | python -c \"import sys,json; d=json.load(sys.stdin); print(d.get('state',''))\""
          op: stdout_contains
          value: "MERGED"

  # ── Review → Implement (revise after review) ────────────────────────
  - from: review
    to: implement
    description: "Review 要求修改，回退实施"
    conditions:
      - file_exists: artifacts/review/changes_requested.md

  # ── Wrap Up → terminal (done) ───────────────────────────────────────
  - from: wrap_up
    to: done
    description: "全部完成"
    conditions:
      - always: true
